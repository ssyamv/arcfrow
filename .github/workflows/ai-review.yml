name: AI Code Review

on:
  pull_request:
    branches: [main, develop, test]
    types: [labeled]
  pull_request_target:
    branches: [main, develop, test]
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    # 触发条件：
    # 1. 仓库内部 PR → 打上 ai-review 标签时触发（CI 通过后、合并前手动打标签）
    # 2. 外部 fork PR → 打上 approved-for-ci 标签后触发
    # 3. Dependabot → 跳过
    if: >-
      github.actor != 'dependabot[bot]' && (
        (github.event_name == 'pull_request' && github.event.label.name == 'ai-review') ||
        (github.event_name == 'pull_request_target' && github.event.label.name == 'approved-for-ci' && github.event.pull_request.head.repo.full_name != github.repository)
      )
    runs-on: ubuntu-latest
    steps:
      # fork PR 通过 pull_request_target 触发时，需要 checkout PR 的 HEAD
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Review this PR for:
            1. Logic errors and bugs (critical)
            2. Security vulnerabilities - OWASP Top 10 (critical)
            3. Data loss risks (critical)
            4. Code quality and maintainability (warning)
            5. Performance issues (warning)
            6. Adherence to project conventions in CLAUDE.md (info)

            Classify each issue as: critical / warning / info.
            Style issues are handled by lint — do not flag them.
            If any critical issues are found, request changes.
            Otherwise, approve the PR.
