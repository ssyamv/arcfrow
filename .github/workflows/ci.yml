name: CI

on:
  pull_request:
    branches: [main, develop, test]
  pull_request_target:
    branches: [main, develop, test]
    types: [labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    # 仓库内部 PR 自动触发；外部 fork PR 需 approved-for-ci 标签
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'approved-for-ci')
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'packages/gateway/**'
            web:
              - 'packages/web/**'
            docs:
              - 'docs/**'
              - '**/*.md'

  lint-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
        working-directory: packages/gateway
      - run: bunx prettier --check packages/gateway/

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
        working-directory: packages/web
      - run: bunx prettier --check packages/web/

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx markdownlint-cli2 "docs/**/*.md"

  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test
        working-directory: packages/gateway
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Check coverage
        run: |
          COVERAGE=$(lcov --summary packages/gateway/coverage/lcov.info 2>&1 | grep 'lines' | grep -o '[0-9.]*%' | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold 60%"
            exit 1
          fi

  test-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx vitest run --coverage --coverage.reporter=lcov
        working-directory: packages/web
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Check coverage
        run: |
          COVERAGE=$(lcov --summary packages/web/coverage/lcov.info 2>&1 | grep 'lines' | grep -o '[0-9.]*%' | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          echo "::notice::Web coverage: ${COVERAGE}% (threshold enforcement deferred until component library stabilized)"
