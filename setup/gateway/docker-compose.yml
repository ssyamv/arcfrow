services:
  gateway:
    build:
      context: ../../packages/gateway
      dockerfile: Dockerfile
    container_name: arcflow-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3100}:3100"
    env_file:
      - .env
    volumes:
      - gateway-data:/app/data
      - gateway-git:/app/git-repos
      - ${SSH_KEY_DIR:-~/.ssh}:/root/.ssh:ro
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  gateway-data:
  gateway-git:
